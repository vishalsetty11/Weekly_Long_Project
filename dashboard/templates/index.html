<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Medallion Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { padding: 12px 24px; font-weight: 600; font-size: 13px; border-bottom: 2px solid transparent; transition: all 0.2s; color: #64748b; }
        .tab-btn.active { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .filter-btn { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .filter-btn.active { background: #10b981; color: white; border-color: #10b981; }
        .tv-link:hover { color: #60a5fa; text-decoration: underline; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    NSE Medallion Intelligence
                </h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Multi-Timeframe Medallion Data Lake</p>
            </div>
            <div id="source-badge" class="text-[10px] font-mono px-2 py-1 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20">CONNECTING...</div>
        </div>

        <!-- 📑 Tab Navigation -->
        <div class="glass rounded-xl overflow-hidden shadow-xl">
            <div class="flex border-b border-white/5 bg-slate-900/30">
                <button onclick="switchTab('weekly', this)" class="tab-btn active">Weekly Long</button>
                <button onclick="switchTab('marubozu', this)" class="tab-btn">Marubozu</button>
                <button onclick="switchTab('hammer', this)" class="tab-btn">Hammer</button>
            </div>

            <!-- Contextual Filter Bar -->
            <div id="toolbar" class="p-4 bg-white/5 flex flex-wrap justify-between items-center gap-4">
                <h2 id="tab-title" class="text-sm font-bold text-slate-300">Strategy Passes</h2>
                <div id="week-filters" class="flex gap-2">
                    <button onclick="filterByWeek(0, this)" class="filter-btn active">Current Week</button>
                    <button onclick="filterByWeek(1, this)" class="filter-btn">Last Week</button>
                    <button onclick="filterByWeek(-1, this)" class="filter-btn">Show All</button>
                </div>
            </div>

            <!-- Table Container -->
            <div class="overflow-x-auto min-h-[400px]">
                <table class="w-full text-left text-sm">
                    <thead id="table-head" class="bg-white/5 text-slate-500 uppercase text-[10px] tracking-wider">
                        <!-- Dynamic Head -->
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5">
                        <!-- Dynamic Data -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Terminal Console -->
        <div class="glass rounded-xl p-4">
            <div class="flex justify-between items-center mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                <span><i class="fas fa-terminal mr-2"></i>SQL Workspace</span>
                <button onclick="runSQL()" class="text-blue-400 hover:text-blue-300">Run Query</button>
            </div>
            <textarea id="sql-input" class="w-full h-20 bg-transparent font-mono text-[11px] text-blue-300 outline-none resize-none border-none" placeholder="SELECT * FROM gold.weekly_long ORDER BY signal_date DESC LIMIT 5;"></textarea>
            <div id="query-status" class="text-[10px] text-red-400 mt-2 hidden"></div>
            <div id="sql-results-container" class="mt-4 overflow-x-auto hidden">
                <table class="w-full text-left text-[11px]">
                    <thead id="sql-head" class="bg-white/5 text-slate-500 uppercase"></thead>
                    <tbody id="sql-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let activeTab = 'weekly';

        function getTVLink(symbol) { 
            return `https://in.tradingview.com/chart/?symbol=NSE%3A${symbol.trim()}`; 
        }

        async function init() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('source-badge').innerText = `${data.source} LIVE`;
                switchTab('weekly', document.querySelector('.tab-btn.active'));
            } catch (e) { console.error(e); }
        }

        async function switchTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const toolbar = document.getElementById('toolbar');
            const weekFilters = document.getElementById('week-filters');
            const title = document.getElementById('tab-title');
            const resultsTable = document.getElementById('sql-results-container');
            resultsTable.classList.add('hidden');

            if(tab === 'weekly') {
                weekFilters.classList.remove('hidden');
                title.innerText = "3x Vol & Momentum (Rolling 4W)";
                const res = await fetch('/api/weekly_long');
                rawData = await res.json();
                filterByWeek(0, document.querySelector('.filter-btn.active'));
            } else if(tab === 'marubozu') {
                weekFilters.classList.add('hidden');
                title.innerText = "Marubozu Patterns (Latest Session)";
                const res = await fetch('/api/marubozu');
                rawData = await res.json();
                renderMarubozu();
            } else if(tab === 'hammer') {
                weekFilters.classList.add('hidden');
                title.innerText = "Hammer Patterns (Latest Session)";
                const res = await fetch('/api/hammer');
                rawData = await res.json();
                renderHammer();
            }
        }

        function filterByWeek(weekNum, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            let filtered = rawData;
            if(weekNum !== -1) {
                const today = new Date();
                const currentMon = new Date(today);
                currentMon.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
                const rangeStart = new Date(currentMon);
                rangeStart.setDate(currentMon.getDate() - (weekNum * 7));
                const rangeEnd = new Date(rangeStart);
                rangeEnd.setDate(rangeStart.getDate() + 6);

                filtered = rawData.filter(s => {
                    const d = new Date(s.signal_date);
                    return d >= rangeStart && d <= rangeEnd;
                });
            }
            renderWeekly(filtered);
        }

        function renderWeekly(data) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = `<tr><th class="px-6 py-4">Pass Date</th><th class="px-6 py-4">Symbol</th><th class="px-6 py-4 text-orange-400">Vol Multiplier</th><th class="px-6 py-4">Deliv Momentum</th><th class="px-6 py-4">Price</th></tr>`;
            body.innerHTML = data.map(s => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4 text-[11px] font-mono text-slate-500">${s.signal_date}</td>
                    <td class="px-6 py-4 font-bold"><a href="${getTVLink(s.symbol)}" target="_blank" class="text-blue-400 tv-link">${s.symbol} <i class="fas fa-external-link-alt text-[8px] opacity-30"></i></a></td>
                    <td class="px-6 py-4"><span class="px-2 py-0.5 rounded bg-orange-500/20 text-orange-400 font-bold text-xs">${(s.weekly_avg_vol/s.six_month_avg_vol).toFixed(1)}x</span></td>
                    <td class="px-6 py-4 text-xs font-semibold text-slate-300">${s.weekly_avg_deliv}%</td>
                    <td class="px-6 py-4 font-mono">₹${s.close_price}</td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-600">No data found for this period.</td></tr>';
        }

        function renderMarubozu() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = `<tr><th class="px-6 py-4">Date</th><th class="px-6 py-4">Symbol</th><th class="px-6 py-4">Type</th><th class="px-6 py-4">Price</th><th class="px-6 py-4">Chg %</th></tr>`;
            body.innerHTML = rawData.map(s => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4 text-[11px] font-mono text-slate-500">${s.signal_date}</td>
                    <td class="px-6 py-4 font-bold"><a href="${getTVLink(s.symbol)}" target="_blank" class="text-blue-400 tv-link">${s.symbol}</a></td>
                    <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${s.pattern_type === 'BULLISH' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">${s.pattern_type}</span></td>
                    <td class="px-6 py-4 font-mono text-slate-200">₹${s.close_price}</td>
                    <td class="px-6 py-4 ${s.price_chg_pct > 0 ? 'text-emerald-400' : 'text-red-400'} font-bold">${s.price_chg_pct}%</td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-600">No Marubozu patterns detected today.</td></tr>';
        }

        function renderHammer() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = `<tr><th class="px-6 py-4">Date</th><th class="px-6 py-4">Symbol</th><th class="px-6 py-4">Open</th><th class="px-6 py-4">High</th><th class="px-6 py-4">Low</th><th class="px-6 py-4">Close</th><th class="px-6 py-4">Chg %</th></tr>`;
            body.innerHTML = rawData.map(s => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4 text-[11px] font-mono text-slate-500">${s.signal_date}</td>
                    <td class="px-6 py-4 font-bold"><a href="${getTVLink(s.symbol)}" target="_blank" class="text-blue-400 tv-link">${s.symbol}</a></td>
                    <td class="px-6 py-4 text-slate-500">${s.open_price}</td>
                    <td class="px-6 py-4 text-slate-500">${s.high_price}</td>
                    <td class="px-6 py-4 text-slate-500">${s.low_price}</td>
                    <td class="px-6 py-4 font-bold text-slate-200">₹${s.close_price}</td>
                    <td class="px-6 py-4 text-emerald-400 font-bold">${s.price_chg_pct}%</td>
                </tr>
            `).join('') || '<tr><td colspan="7" class="p-10 text-center text-slate-600">No Hammer patterns detected today.</td></tr>';
        }

        async function runSQL() {
            const sql = document.getElementById('sql-input').value;
            const status = document.getElementById('query-status');
            const resContainer = document.getElementById('sql-results-container');
            const head = document.getElementById('sql-head');
            const body = document.getElementById('sql-body');
            status.classList.add('hidden');
            try {
                const res = await fetch('/api/query', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sql})});
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                resContainer.classList.remove('hidden');
                head.innerHTML = `<tr>${data.columns.map(c => `<th class="px-4 py-2">${c}</th>`).join('')}</tr>`;
                body.innerHTML = data.results.map(row => `<tr>${data.columns.map(c => {
                    const v = row[c];
                    if (c.toLowerCase() === 'symbol' && v) return `<td class="px-4 py-2 font-bold"><a href="${getTVLink(v)}" target="_blank" class="text-blue-400">${v}</a></td>`;
                    return `<td class="px-4 py-2 text-slate-400 font-mono">${v ?? '-'}</td>`;
                }).join('')}</tr>`).join('');
            } catch (e) { status.innerText = e.message; status.classList.remove('hidden'); resContainer.classList.add('hidden'); }
        }

        init();
    </script>
</body>
</html>
